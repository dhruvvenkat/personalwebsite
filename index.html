<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dhruv Venkat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #111;
            --text-color: #00ff00;
            --line-color: #00ff00;
            --dot-color: #00ff00;
            --border-color: #00ff00;
            --content-bg: #000;
        }

        body.light-theme {
            --bg-color: #000;
            --text-color: #d0d0d0;
            --line-color: #d0d0d0;
            --dot-color: #d0d0d0;
            --border-color: #d0d0d0;
            --content-bg: #0a0a0a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
        }

        /* CRT Screen Effect */
        .crt {
            position: relative;
        }

        .crt::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 0, 0.03) 2px,
                rgba(0, 255, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        .crt * {
            text-shadow: 0 0 1px currentColor;
        }

        body.light-theme .crt::before {
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(208, 208, 208, 0.03) 2px,
                rgba(208, 208, 208, 0.03) 4px
            );
        }

        .container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .line-container {
            position: relative;
            width: 800px;
            height: 100px;
            margin: 60px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .line {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--line-color);
            opacity: 0.3;
            top: 50%;
            transform: translateY(-50%);
            transition: background-color 0.3s ease;
        }

        .section-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--dot-color);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 4;
            opacity: 0.6;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
        }

        .section-dot:hover {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 10px var(--dot-color);
        }

        .section-dot.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.5);
            box-shadow: 0 0 15px var(--dot-color);
        }

        .walking-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: var(--dot-color);
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
            box-shadow: 0 0 20px var(--dot-color);
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px var(--dot-color);
            }
            50% {
                box-shadow: 0 0 30px var(--dot-color), 0 0 40px var(--dot-color);
            }
        }

        .section-labels {
            position: absolute;
            width: 100%;
            top: -30px;
            font-size: 12px;
            opacity: 0.5;
            pointer-events: none;
        }

        .section-label {
            position: absolute;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: translateX(-50%);
        }

        .section-label:nth-child(1) {
            left: 0%;
        }

        .section-label:nth-child(2) {
            left: 25%;
        }

        .section-label:nth-child(3) {
            left: 50%;
        }

        .section-label:nth-child(4) {
            left: 75%;
        }

        .section-label:nth-child(5) {
            left: 100%;
        }

        .content-area {
            margin-top: 40px;
            width: 800px;
            min-height: 200px;
            padding: 30px;
            background-color: var(--content-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.5s ease, background-color 0.3s ease, border-color 0.3s ease;
            position: relative;
            margin-left: auto;
            margin-right: auto;
        }

        .content-area.visible {
            opacity: 1;
        }

        .terminal-content {
            font-size: 14px;
            line-height: 1.8;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .typing-line {
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 10px;
            width: 100%;
            display: block;
        }

        .terminal-content a {
            color: var(--text-color);
            text-decoration: underline;
            transition: opacity 0.3s ease, color 0.3s ease;
        }

        .terminal-content a:hover {
            opacity: 0.7;
        }

        .terminal-content strong {
            font-weight: bold;
            color: var(--text-color);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: var(--text-color);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
            transition: background-color 0.3s ease;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        .typing-line {
            margin-bottom: 10px;
        }

        .section-title {
            color: var(--text-color);
            font-size: 18px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: color 0.3s ease;
        }

        .hidden {
            display: none;
        }

        /* AI Assistant Section Styles - Now a Floating Modal */
        #assistant {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 500px;
            max-width: 90vw;
            z-index: 10000;
            background-color: #000;
            border: 1px solid #00ff44;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 68, 0.5), inset 0 0 10px rgba(0, 255, 68, 0.1);
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #assistant.visible {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        #assistant h2 {
            text-align: center;
            font-size: 24px;
            letter-spacing: 4px;
            margin: 20px 0;
            padding: 0 40px;
            color: #00ff44;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff44, 0 0 20px #00ff44;
            position: relative;
        }

        #assistant-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: transparent;
            border: 1px solid #00ff44;
            color: #00ff44;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10001;
            line-height: 1;
            padding: 0;
        }

        #assistant-close:hover {
            background-color: #00ff44;
            color: #000;
            box-shadow: 0 0 10px #00ff44;
        }

        #terminal-chat {
            width: 100%;
            margin: 0;
            background-color: #000;
            border: none;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
        }

        #chat-output {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #00ff44;
            background-color: #000;
        }

        #chat-output::-webkit-scrollbar {
            width: 8px;
        }

        #chat-output::-webkit-scrollbar-track {
            background: #000;
        }

        #chat-output::-webkit-scrollbar-thumb {
            background: #00ff44;
            border-radius: 4px;
        }

        #chat-output::-webkit-scrollbar-thumb:hover {
            background: #00cc33;
        }

        .chat-message {
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .chat-message.user {

        }

        .chat-message.assistant {

        }

        .chat-message .prompt {

        }

        .chat-input-container {

            background-color: #000;
        }

        .chat-prompt {

            margin-right: 8px;

        }

        #chat-input {

        #chat-input::placeholder {

        .chat-loading {

            opacity: 0.7;

        }

        .chat-message code {

        .chat-message pre {

            overflow-x: auto;

        }

        .chat-message pre code {
            background: none;
            padding: 0;
            border-radius: 0;

        .chat-message strong {
            font-weight: bold;
            color: #00ff44;
        }

        .chat-message em {
            font-style: italic;
            color: #00ff44;
        }

        .chat-message ul, .chat-message ol {

        .chat-message li {
            margin: 5px 0;
        }

        .chat-message p {

        }

        .chat-message p:first-child {
            margin-top: 0;
        }

        .chat-message p:last-child {
            margin-bottom: 0;

            display: none;

        @keyframes pulse {

        .name-header {

            animation: resumeGlow 2s ease-in-out infinite;
            font-weight: bold;
            background-color: rgba(0, 255, 68, 0.1);
        }

        @keyframes resumeGlow {
            0%, 100% {

                            0 0 50px rgba(0, 255, 68, 0.2);

            }
        }

        .theme-toggle:hover, .resume-button:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            opacity: 0.9;

            background-color: rgba(0, 255, 68, 0.2);
            transform: scale(1.1);

                            0 0 60px rgba(0, 255, 68, 0.6),
                            0 0 80px rgba(0, 255, 68, 0.4);
            }
            50% {

                            0 0 70px rgba(0, 255, 68, 0.7),
                            0 0 90px rgba(0, 255, 68, 0.5);
            }
        }

        /* Boot Sequence */
        .boot-sequence {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 1;

        .boot-sequence.hidden {

            pointer-events: none;
        }

        .boot-content {
            font-family: 'Courier New', monospace;
            color: var(--text-color);
            font-size: 16px;
            line-height: 1.8;
        }

        .boot-line {
            margin-bottom: 10px;
        }

        .boot-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: var(--text-color);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        .main-content {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .main-content.visible {
            opacity: 1;
        }
    </style>
</head>

        // Simple markdown parser for basic formatting
        function parseMarkdown(text) {
            // First escape HTML to prevent XSS
            let html = escapeHtml(text);
            
            // Split into lines for processing
            const lines = html.split('\n');
            const processedLines = [];
            let inCodeBlock = false;
            let codeBlockContent = [];
            let inList = false;
            let listItems = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                
                // Handle code blocks
                if (line.trim().startsWith('```')) {
                    if (inCodeBlock) {
                        // End code block
                        processedLines.push(`<pre><code>${codeBlockContent.join('\n')}</code></pre>`);
                        codeBlockContent = [];
                        inCodeBlock = false;
                    } else {
                        // Start code block
                        inCodeBlock = true;
                        if (inList) {
                            processedLines.push('</ul>');
                            inList = false;
                        }
                    }
                    continue;
                }
                
                if (inCodeBlock) {
                    codeBlockContent.push(line);
                    continue;
                }
                
                // Handle lists
                const listMatch = line.match(/^[\-\*] (.+)$/);
                if (listMatch) {
                    if (!inList) {
                        inList = true;
                    }
                    listItems.push(`<li>${processInlineMarkdown(listMatch[1])}</li>`);
                    continue;
                } else {
                    if (inList) {
                        processedLines.push(`<ul>${listItems.join('')}</ul>`);
                        listItems = [];
                        inList = false;
                    }
                }
                
                // Process regular lines
                if (line.trim()) {
                    processedLines.push(`<p>${processInlineMarkdown(line)}</p>`);
                } else {
                    processedLines.push('<br>');
                }
            }
            
            // Close any open lists or code blocks
            if (inList) {
                processedLines.push(`<ul>${listItems.join('')}</ul>`);
            }
            if (inCodeBlock) {
                processedLines.push(`<pre><code>${codeBlockContent.join('\n')}</code></pre>`);
            }
            
            return processedLines.join('');
        }
        
        // Process inline markdown (bold, italic, code)
        function processInlineMarkdown(text) {
            let html = text;
            
            // Inline code (`code`) - do this first to avoid conflicts
            html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
            
            // Bold (**text** or __text__) - process before italic
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            
            // Italic (*text* or _text_) - process after bold to avoid conflicts
            // Use a pattern that matches single asterisks/underscores
            html = html.replace(/(^|[^*])\*([^*\n]+?)\*([^*]|$)/g, '$1<em>$2</em>$3');
            html = html.replace(/(^|[^_])_([^_\n]+?)_([^_]|$)/g, '$1<em>$2</em>$3');
            
            return html;
        }

            assistantClose.addEventListener('click', toggleAssistant);
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && assistantContainer.classList.contains('visible')) {
                toggleAssistant();
            }
        });
    </script>
    </div>
</body>
</html>
